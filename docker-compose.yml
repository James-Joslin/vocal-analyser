services:
  python-cognitive-api:
    build:
      context: ./python-api
      dockerfile: Dockerfile
      target: development
    container_name: python-stress-service
    command: ["tail", "-f", "/dev/null"]
    stdin_open: true
    tty: true
    ports:
      - "8010:8000"
    environment:
      TZ: UTC
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      HF_HOME: /app/.cache/huggingface
    volumes:
      - ./python-api:/app
      - python-huggingface-cache:/app/.cache/huggingface
    networks:
      - stress-dev-network
    restart: unless-stopped

  vocal-stress-web-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: stress-react-dashboard
    depends_on:
      - python-cognitive-api
    command: ["tail", "-f", "/dev/null"]
    stdin_open: true
    tty: true
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      NODE_ENV: development
      VITE_PORT: "3001"
      VITE_API_TARGET: http://python-cognitive-api:8000
      COGNITIVE_API_URL: http://python-cognitive-api:8000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - web-node-modules:/app/node_modules
      - web-dist:/app/dist
    networks:
      - stress-dev-network
    restart: unless-stopped

volumes:
  python-huggingface-cache:
  web-node-modules:
  web-dist:

networks:
  stress-dev-network:
    driver: bridge